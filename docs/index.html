<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Malaria Feed</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light dark">

<!-- iOS "Add to Home Screen" -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Malaria Feed">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<meta name="theme-color" content="#0b7285" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0b1416" media="(prefers-color-scheme: dark)">

<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="app.css">
</head>
<body>
<header class="app-header">
  <div class="header-row">
    <h1 class="app-title">Malaria Feed</h1>
    <div class="header-right">
      <span id="updated" class="updated" aria-live="polite"></span>
      <button id="export-btn" class="export-btn" type="button">Export</button>
      <button id="settings-btn" class="export-btn" type="button" aria-label="Sync settings">⚙</button>
    </div>
  </div>
  <div class="search-wrap">
    <input id="search" class="search" type="search" inputmode="search"
           placeholder="Search headlines & titles" autocomplete="off"
           autocorrect="off" autocapitalize="none" enterkeyhint="search">
    <button id="sort-btn" class="sort-btn" type="button" title="Sort by date">Newest</button>
  </div>
  <div id="project-bar" class="project-bar" aria-label="Filter by project"></div>
</header>

<button id="new-pill" class="new-pill" type="button" hidden></button>

<main id="feed" class="feed" aria-live="polite"></main>

<div id="loading" class="state">Loading your feed…</div>
<div id="empty" class="state" hidden></div>
<div id="error" class="state" hidden>
  <p>Couldn't load your feed right now.</p>
  <button id="retry" class="btn" type="button">Try again</button>
</div>
<div id="sentinel" aria-hidden="true"></div>

<nav class="tabbar" role="tablist">
  <button class="tab" role="tab" data-view="inbox" aria-selected="true">
    <span class="tab-label">Inbox</span><span class="tab-count" data-count="inbox"></span>
  </button>
  <button class="tab" role="tab" data-view="important" aria-selected="false">
    <span class="tab-label">Important</span><span class="tab-count" data-count="important"></span>
  </button>
  <button class="tab" role="tab" data-view="archive" aria-selected="false">
    <span class="tab-label">Archive</span><span class="tab-count" data-count="archive"></span>
  </button>
</nav>

<div id="settings-modal" class="star-modal" hidden>
  <div class="sm-sheet settings-sheet" role="dialog" aria-label="Sync settings" aria-modal="true">
    <p class="sm-title">Backup &amp; Sync</p>
    <p class="set-help">Backs up your triage (archive / important / stars / tags) to your private
      GitHub so it survives cache-clears and syncs across devices.</p>
    <label class="set-label" for="sync-token">GitHub token (fine-grained, repo <b>ncbi-feed</b>, Contents: read &amp; write)</label>
    <input id="sync-token" class="set-input" type="password" autocomplete="off" autocorrect="off"
           autocapitalize="none" spellcheck="false" placeholder="github_pat_…">
    <div class="set-row">
      <button id="sync-save" class="set-btn primary" type="button">Save &amp; sync</button>
      <button id="sync-disconnect" class="set-btn" type="button">Disconnect</button>
    </div>
    <p id="sync-status" class="sync-status">Not set up</p>
    <hr class="set-hr">
    <p class="set-help">Manual backup file (extra insurance):</p>
    <div class="set-row">
      <button id="export-json" class="set-btn" type="button">Export JSON</button>
      <button id="import-json-btn" class="set-btn" type="button">Import JSON</button>
      <input id="import-json" type="file" accept="application/json,.json" hidden>
    </div>
    <button id="set-close" class="sm-cancel" type="button">Close</button>
  </div>
</div>

<div id="star-modal" class="star-modal" hidden>
  <div class="sm-sheet" role="dialog" aria-label="Rate importance" aria-modal="true">
    <p class="sm-title">Mark important</p>
    <div class="sm-stars" id="sm-stars"></div>
    <button id="sm-cancel" class="sm-cancel" type="button">Cancel</button>
  </div>
</div>

<template id="card-tpl">
  <article class="card" data-pmid="">
    <div class="card-stars" hidden></div>
    <div class="card-main">
      <h2 class="headline"></h2>
    </div>
    <div class="meta-row">
      <span class="meta"><span class="journal"></span><span class="meta-dot"> · </span><span class="date"></span></span>
    </div>
    <div class="proj-chips"></div>
    <div class="card-actions">
      <button class="act authors-btn" type="button" aria-expanded="false">Authors</button>
      <button class="act title-btn" type="button" aria-expanded="false">Title</button>
      <button class="act abstract-btn" type="button" aria-expanded="false">Abstract</button>
    </div>
    <div class="details-peek peek" hidden>
      <p class="peek-label">Summary</p>
      <p class="details-text"></p>
      <a class="fulltext-link" target="_blank" rel="noopener">Open full text on PubMed&nbsp;↗</a>
    </div>
    <div class="authors-peek peek" hidden>
      <p class="peek-label">Authors</p>
      <p class="authors-text"></p>
    </div>
    <div class="title-peek peek" hidden>
      <p class="peek-label">Original title</p>
      <p class="orig-title"></p>
    </div>
    <div class="abstract peek" hidden>
      <p class="peek-label">Abstract</p>
      <p class="abstract-text"></p>
      <a class="fulltext-link" target="_blank" rel="noopener">Open full text on PubMed&nbsp;↗</a>
    </div>
    <div class="proj-editor peek" hidden>
      <p class="peek-label">File under projects</p>
      <div class="proj-editor-chips"></div>
    </div>
    <div class="note-peek peek" hidden>
      <p class="peek-label">Notes</p>
      <textarea class="note-text" rows="3" placeholder="Your notes…"
                autocomplete="off" autocorrect="on" spellcheck="true"></textarea>
    </div>
  </article>
</template>

<script src="app.js"></script>
</body>
</html>
